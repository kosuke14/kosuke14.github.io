<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>スタプラデイリーレポート生成</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap');

  :root {
    --bg: #0d0f14;
    --surface: #161921;
    --surface2: #1e2230;
    --border: #2a2f42;
    --accent: #5b7fff;
    --accent2: #a78bfa;
    --text: #e8eaf6;
    --text-muted: #6b7280;
    --success: #34d399;
    --error: #f87171;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
    background-image:
      radial-gradient(ellipse at 20% 20%, rgba(91,127,255,0.07) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(167,139,250,0.05) 0%, transparent 50%);
  }

  .container {
    width: 100%;
    max-width: 680px;
  }

  .header {
    margin-bottom: 32px;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 6px;
  }

  .header p {
    font-size: 13px;
    color: var(--text-muted);
    font-weight: 300;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    margin-bottom: 16px;
  }

  /* タブ */
  .section-tabs {
    display: flex;
    gap: 4px;
    margin-bottom: 18px;
    background: var(--surface2);
    border-radius: 8px;
    padding: 3px;
  }

  .tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    border-radius: 6px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
    font-family: 'Noto Sans JP', sans-serif;
  }

  .tab-btn.active {
    background: var(--surface);
    color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  /* アカウントリスト */
  .account-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .account-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
  }

  .account-item:hover {
    border-color: var(--accent);
    background: rgba(91,127,255,0.05);
  }

  .account-item.selected {
    border-color: var(--accent);
    background: rgba(91,127,255,0.08);
  }

  .account-item-info { flex: 1; min-width: 0; }

  .account-item-name {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .account-item-user {
    font-size: 11px;
    color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
    margin-top: 2px;
  }

  .account-item-del {
    background: transparent;
    border: none;
    color: var(--text-muted);
    font-size: 16px;
    line-height: 1;
    padding: 2px 6px;
    border-radius: 4px;
    cursor: pointer;
    transition: color 0.15s;
    font-family: inherit;
  }

  .account-item-del:hover { color: var(--error); }

  .empty-hint {
    font-size: 13px;
    color: var(--text-muted);
    text-align: center;
    padding: 20px 0 8px;
    line-height: 1.8;
  }

  /* 新規追加フォーム */
  .input-label {
    font-size: 12px;
    color: var(--text-muted);
    margin-bottom: 8px;
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .input-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
  }

  .input-row input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 13px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s;
  }

  .input-row input[type="text"]:focus { border-color: var(--accent); }

  .input-row input[type="text"]::placeholder {
    color: var(--text-muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 12px;
  }

  .btn-save {
    background: rgba(91,127,255,0.15);
    border: 1px solid rgba(91,127,255,0.35);
    color: var(--accent);
    padding: 10px 16px;
    font-size: 12px;
    white-space: nowrap;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    transition: background 0.2s;
  }

  .btn-save:hover { background: rgba(91,127,255,0.25); }

  .username-hint {
    font-size: 12px;
    color: var(--text-muted);
    padding: 10px 12px;
    background: rgba(91,127,255,0.05);
    border: 1px solid rgba(91,127,255,0.15);
    border-radius: 8px;
    line-height: 1.7;
  }

  .username-hint a { color: var(--accent); text-decoration: none; }
  .username-hint a:hover { text-decoration: underline; }
  .username-hint code {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    background: rgba(255,255,255,0.07);
    padding: 1px 5px;
    border-radius: 3px;
  }

  /* 生成ボタン */
  .btn-generate {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white;
    padding: 12px;
    font-size: 14px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    transition: opacity 0.2s, transform 0.2s;
    margin-top: 16px;
  }

  .btn-generate:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
  .btn-generate:disabled { opacity: 0.4; cursor: not-allowed; }

  .status {
    font-size: 13px;
    padding: 10px 14px;
    border-radius: 8px;
    margin-top: 12px;
    display: none;
  }

  .status.loading {
    display: block;
    background: rgba(91,127,255,0.1);
    border: 1px solid rgba(91,127,255,0.3);
    color: var(--accent);
  }

  .status.error {
    display: block;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    color: var(--error);
  }

  .result-card { display: none; }
  .result-card.visible { display: block; }

  .result-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }

  .result-label {
    font-size: 12px;
    color: var(--text-muted);
    font-weight: 500;
    letter-spacing: 0.5px;
    text-transform: uppercase;
  }

  .code-block {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 20px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 13.5px;
    line-height: 1.8;
    white-space: pre-wrap;
    word-break: break-word;
    color: #c9d1d9;
  }

  .btn-copy {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 6px;
    border-radius: 8px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 500;
    transition: all 0.2s;
  }

  .btn-copy:hover { border-color: var(--accent); color: var(--accent); }
  .btn-copy.copied { border-color: var(--success); color: var(--success); }

  .spinner {
    display: inline-block;
    width: 12px;
    height: 12px;
    border: 2px solid rgba(91,127,255,0.3);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin-right: 6px;
    vertical-align: middle;
  }

  @keyframes spin { to { transform: rotate(360deg); } }
</style>
  
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📓 デイリーレポート生成</h1>
    <p>Studyplusの学習履歴から最新日のレポートを自動生成します</p>
  </div>

  <div class="card">
    <div class="section-tabs">
      <button class="tab-btn active" id="tabList" onclick="switchTab('list')">保存済みアカウント</button>
      <button class="tab-btn" id="tabAdd" onclick="switchTab('add')">新規追加</button>
    </div>

    <!-- リストパネル -->
    <div id="panelList">
      <div class="account-list" id="accountList"></div>
    </div>

    <!-- 新規追加パネル -->
    <div id="panelAdd" style="display:none;">
      <div class="input-label">表示名</div>
      <div class="input-row">
        <input type="text" id="inputName" placeholder="例: メインアカウント" />
      </div>
      <div class="input-label">ユーザーネーム</div>
      <div class="input-row">
        <input type="text" id="inputUsername" placeholder="例: taro_study" />
        <button class="btn-save" onclick="saveAccount()">保存</button>
      </div>
      <div class="username-hint">
        💡 ユーザーネームは
        <a href="https://app.studyplus.jp/timeline" target="_blank">app.studyplus.jp/timeline</a>
        の左上アイコン → プロフィールページのURL、<code>users/</code> の後の文字列です。
      </div>
    </div>

    <button class="btn-generate" id="fetchBtn" onclick="fetchAndGenerate()">レポートを生成</button>
    <div class="status" id="status"></div>
  </div>

  <div class="card result-card" id="resultCard">
    <div class="result-header">
      <div class="result-label">生成されたレポート</div>
      <button class="btn-copy" id="copyBtn" onclick="copyReport()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
        コピー
      </button>
    </div>
    <div class="code-block" id="reportOutput"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'studyplus_accounts';
let selectedUsername = '';

function loadAccounts() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || []; }
  catch { return []; }
}

function saveAccounts(list) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(list));
}

function switchTab(tab) {
  const isList = tab === 'list';
  document.getElementById('panelList').style.display = isList ? '' : 'none';
  document.getElementById('panelAdd').style.display = isList ? 'none' : '';
  document.getElementById('tabList').classList.toggle('active', isList);
  document.getElementById('tabAdd').classList.toggle('active', !isList);
  if (isList) renderList();
}

function renderList() {
  const accounts = loadAccounts();
  const container = document.getElementById('accountList');
  container.innerHTML = '';

  if (!accounts.length) {
    container.innerHTML = '<div class="empty-hint">保存済みのアカウントがありません。<br>「新規追加」タブから登録してください。</div>';
    selectedUsername = '';
    return;
  }

  accounts.forEach((acc, i) => {
    const item = document.createElement('div');
    item.className = 'account-item' + (acc.username === selectedUsername ? ' selected' : '');
    item.innerHTML = `
      <div class="account-item-info">
        <div class="account-item-name">${escHtml(acc.name)}</div>
        <div class="account-item-user">@${escHtml(acc.username)}</div>
      </div>
      <button class="account-item-del" title="削除" onclick="deleteAccount(${i}, event)">×</button>
    `;
    item.addEventListener('click', () => selectAccount(acc.username));
    container.appendChild(item);
  });
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function selectAccount(username) {
  selectedUsername = username;
  renderList();
  document.getElementById('status').style.display = 'none';
}

function saveAccount() {
  const name = document.getElementById('inputName').value.trim();
  const username = document.getElementById('inputUsername').value.trim();
  if (!name) { alert('表示名を入力してください'); return; }
  if (!username) { alert('ユーザーネームを入力してください'); return; }

  const accounts = loadAccounts();
  if (accounts.find(a => a.username === username)) {
    alert('そのユーザーネームはすでに登録されています');
    return;
  }
  accounts.push({ name, username });
  saveAccounts(accounts);
  document.getElementById('inputName').value = '';
  document.getElementById('inputUsername').value = '';
  selectedUsername = username;
  switchTab('list');
}

function deleteAccount(index, e) {
  e.stopPropagation();
  const accounts = loadAccounts();
  const removed = accounts.splice(index, 1)[0];
  if (removed.username === selectedUsername) selectedUsername = '';
  saveAccounts(accounts);
  renderList();
}

/* ===== レポートロジック ===== */
const DAYS_JA = ['日','月','火','水','木','金','土'];

const SUBJECT_MAP = {
  '英語': ['英単語','英文','英語長文','The Rules','ポラリス','ターゲット','Rules','Duolingo','英文解釈','英文法'],
  '数学': ['数学','ゴールデンルート','GR数学','算数'],
  '物理': ['物理'],
  '化学': ['化学'],
  '古文': ['古文','古典','ジャンプアップ','ステップアップ','古文単語'],
  '現代文': ['現代文','キーワード読解','面白いほど'],
  '公共': ['公共','倫理','政経'],
  '地理': ['地理'],
  '歴史': ['歴史','日本史','世界史'],
};

function classifySubject(title) {
  for (const [subj, keywords] of Object.entries(SUBJECT_MAP)) {
    for (const kw of keywords) { if (title.includes(kw)) return subj; }
  }
  return 'その他';
}

function formatTitle(raw) {
  let t = raw.trim();
  if (t.includes('ゴールデンルート') && t.includes('数学')) return 'GR数学IAIIB';
  const omoshiroi = t.match(/(.+?)の?(.+?)が?面白いほどできる(.+)/);
  if (omoshiroi) return omoshiroi[2] + '面白いドリル';
  const polarisMatch = t.match(/(英文解釈|英文法)ポラリス\s*([０-９0-9１２３４５６７８９]+)/);
  if (polarisMatch) {
    const num = polarisMatch[2].replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
    return `関正生の${polarisMatch[1]}ポラリス${num}`;
  }
  if (t.includes('The Rules') || t.includes('Ｔｈｅ　Ｒｕｌｅｓ') || t.includes('ＴｈｅＲｕｌｅｓ')) {
    const num = t.match(/[０-９0-9１２３４５６７８９]+/);
    const n = num ? num[0].replace(/[０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0)) : '';
    return `関正生のThe Rules英語長文問題集${n}`;
  }
  if (t.includes('ジャンプアップ')) return 'ジャンプアップノート古典文法';
  if (t.includes('ステップアップ')) return 'ステップアップノート古典文法';
  t = t.replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0));
  t = t.replace(/　/g, ' ');
  t = t.replace('英単語ターゲット１９００', '英単語ターゲット1900');
  return t;
}

function formatPages(start, end, unit) {
  if (!unit || unit === 'コマ' || unit === 'レッスン') return null;
  if (unit === '問') return start === end ? `問${start}` : `問${start} - 問${end}`;
  return start === end ? `p.${start}` : `pp.${start} - pp.${end}`;
}

function formatDuration(totalSec) {
  const h = Math.floor(totalSec / 3600);
  const m = Math.floor((totalSec % 3600) / 60);
  if (h > 0 && m > 0) return `${h}時間${m}分`;
  if (h > 0) return `${h}時間`;
  return `${m}分`;
}

function buildReport(records, targetDate) {
  const filtered = records.filter(r => r.record_date === targetDate);
  if (!filtered.length) return null;

  const dateObj = new Date(targetDate);
  const month = dateObj.getMonth() + 1;
  const day = dateObj.getDate();
  const dow = DAYS_JA[dateObj.getDay()];

  const subjTime = {};
  const materialMap = new Map();

  for (const r of filtered) {
    const subj = classifySubject(r.material_title);
    subjTime[subj] = (subjTime[subj] || 0) + r.duration;

    if (r.unit === 'コマ' || r.unit === 'レッスン') {
      const title = r.material_title.includes('授業') ? (r.record_comment || r.material_title) : formatTitle(r.material_title);
      if (!materialMap.has(title)) materialMap.set(title, { title, unit: r.unit, comment: r.record_comment });
    } else {
      const title = formatTitle(r.material_title);
      if (!materialMap.has(title)) {
        materialMap.set(title, { title, start: r.start_position, end: r.end_position, unit: r.unit });
      } else {
        const ex = materialMap.get(title);
        ex.start = Math.min(ex.start, r.start_position);
        ex.end = Math.max(ex.end, r.end_position);
      }
    }
  }

  const SUBJ_ORDER = ['英語','数学','物理','化学','古文','現代文','公共','地理','歴史','その他'];
  const subjLines = SUBJ_ORDER.filter(s => subjTime[s]).map(s => `- ${s}　${formatDuration(subjTime[s])}`);

  const contentLines = [];
  for (const [, m] of materialMap) {
    if (m.unit === 'コマ') {
      const comment = m.comment ? m.comment.replace(/\n/g, '・') : '';
      contentLines.push(`- ${m.title}${comment ? `（${comment}）` : ''}`);
    } else if (m.unit === 'レッスン') {
      contentLines.push(`- ${m.title}`);
    } else {
      const pages = formatPages(m.start, m.end, m.unit);
      contentLines.push(`- ${m.title}${pages ? `（${pages}）` : ''}`);
    }
  }

  return `《デイリーレポート》\n●日付：${month}月${day}日（${dow}）\n\n●勉強時間\n${subjLines.join('\n')}\n\n●勉強内容\n${contentLines.join('\n')}\n\n●振り返り、気づき`;
}

async function fetchAndGenerate() {
  if (!selectedUsername) {
    showStatus('error', 'アカウントを選択してください（または「新規追加」タブで登録してください）');
    return;
  }

  const btn = document.getElementById('fetchBtn');
  btn.disabled = true;
  showStatus('loading', '<span class="spinner"></span>データを取得中...');
  document.getElementById('resultCard').classList.remove('visible');

  try {
    const url = `https://api.studyplus.jp/2/users/${selectedUsername}/records?page=1&per_page=50`;
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}: ユーザーネームが正しいか確認してください`);
    const data = await res.json();
    const records = data.records || [];
    if (!records.length) throw new Error('学習記録が見つかりませんでした');

    const latestDate = records.map(r => r.record_date).sort().reverse()[0];
    const report = buildReport(records, latestDate);
    if (!report) throw new Error('レポートを生成できませんでした');

    document.getElementById('reportOutput').textContent = report;
    document.getElementById('resultCard').classList.add('visible');
    document.getElementById('status').style.display = 'none';
  } catch (e) {
    showStatus('error', '⚠️ ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

function showStatus(type, html) {
  const el = document.getElementById('status');
  el.className = 'status' + (type ? ' ' + type : '');
  el.innerHTML = html;
  if (!type) el.style.display = 'none';
}

function copyReport() {
  const text = document.getElementById('reportOutput').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg> コピー済`;
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> コピー`;
    }, 2000);
  });
}

/* 初期化 */
(function init() {
  const accounts = loadAccounts();
  if (accounts.length) selectedUsername = accounts[0].username;
  renderList();
})();
</script>

</body>
</html>
